<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование по математике (2 семестр)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f0f2f5; color: #333; line-height: 1.6; }
        .hidden { display: none !important; }
        .menu, .result { text-align: center; margin-top: 10vh; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; margin: 10px; font-size: 16px; cursor: pointer; background: #0056b3; color: white; border: none; border-radius: 8px; transition: background 0.3s; }
        button:hover { background: #004494; }
        .question-block { background: white; padding: 25px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-title { margin-top: 0; font-size: 1.1em; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 15px; }
        .option { display: block; margin: 10px 0; padding: 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .option:hover { background: #f8f9fa; }
        .option input { margin-right: 10px; }
        .correct { background: #d4edda !important; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da !important; color: #721c24; border: 1px solid #f5c6cb; }
        .math { font-style: italic; font-family: "Times New Roman", Times, serif; font-size: 1.1em; }
        #submit-btn { width: 100%; font-size: 18px; padding: 15px; margin-top: 20px; background: #28a745; }
        #submit-btn:hover { background: #218838; }
    </style>
</head>
<body>

    <div id="menu" class="menu">
        <h2>Выберите режим тестирования</h2>
        <p>Все правильные ответы автоматически учтены на основе ваших данных.</p>
        <button onclick="startQuiz('theory')">Теоретическая часть (20 вопросов)</button>
        <button onclick="startQuiz('practice')">Практическая часть (20 вопросов)</button>
        <button onclick="startQuiz('mixed')">Всё вместе (40 вопросов)</button>
    </div>

    <div id="quiz-container" class="hidden">
        <h2 id="quiz-title" style="text-align: center;"></h2>
        <div id="questions-area"></div>
        <button id="submit-btn" onclick="checkAnswers()">Завершить тест и узнать результат</button>
    </div>

    <div id="result" class="result hidden">
        <h2>Результаты теста</h2>
        <h1 id="score-text" style="color: #0056b3; font-size: 3em; margin: 20px 0;"></h1>
        <button onclick="location.reload()">Вернуться в главное меню</button>
    </div>

    <script>

            { q: "По определению y есть функция от x, если:", a: ["каждому значению x соответствует одно определенное значение y", "каждому значению x, принадлежащей некоторому множеству, соответствует одно определенное значение y", "каждому значению x соответствуют какие-то значения y", "каждому значению y соответствуют какие-то значения x"], c: 1 },
            { q: "Функция называется неубывающей на некотором интервале, если для любых двух значений аргумента x<sub>1</sub> и x<sub>2</sub> из этого интервала:", a: ["f(x<sub>2</sub>) &ge; f(x<sub>1</sub>) при x<sub>2</sub> > x<sub>1</sub>", "f(x<sub>2</sub>) > f(x<sub>1</sub>) при x<sub>2</sub> > x<sub>1</sub>", "f(x<sub>2</sub>) &le; f(x<sub>1</sub>) при x<sub>2</sub> > x<sub>1</sub>", "f(x<sub>2</sub>) < f(x<sub>1</sub>) при x<sub>2</sub> > x<sub>1</sub>"], c: 0 },

            { q: "Бесконечно малые функции &alpha; и &beta; называются бесконечно малыми одного порядка, если:", a: ["lim (&alpha;/&beta;) = 0", "lim (&alpha;/&beta;) = &infin;", "lim (&alpha;/&beta;) не существует", "lim (&alpha;/&beta;) = A &ne; 0"], c: 3 },
            { q: "Производной функции y = f(x) в точке x<sub>0</sub> называется:", a: ["lim (f(x)/x)", "lim (f(x<sub>0</sub>)/(x-x<sub>0</sub>))", "lim (&Delta;f / &Delta;x)", "lim<sub>&Delta;x&rarr;0</sub> (f(x<sub>0</sub>+&Delta;x) - f(x<sub>0</sub>)) / &Delta;x"], c: 3 },
            { q: "Производная f'(x) в точке x есть:", a: ["касательная к графику функции в точке x", "угол между касательной и положительным направлением оси Ox", "угол между касательной и отрицательным направлением оси Ox", "угловой коэффициент касательной к графику функции y = f(x) в точке x"], c: 3 },

            { q: "Производная функции y = 5<sup>x&sup2;+1</sup> имеет вид:", a: ["y' = 2x &middot; 5<sup>x&sup2;+1</sup>", "y' = (x<sup>2</sup>+1) &middot; 5<sup>x&sup2;</sup>", "y' = 2x &middot; 5<sup>x&sup2;+1</sup> ln 5", "y' = 2x &middot; 5<sup>x&sup2;</sup>"], c: 2 },
            { q: "Производная функции y = x + arctg x имеет вид:", a: ["y' = 1 - 1/(1+x<sup>2</sup>)", "y' = (2+x<sup>2</sup>)/(1+x<sup>2</sup>)", "y' = 1/(1+x<sup>2</sup>)", "y' = 1 + 1/&radic;(1+x<sup>2</sup>)"], c: 1 },
            { q: "Применима ли теорема Ролля для f(x) = 9 - x<sup>2</sup> на отрезке [-2, 2]? Найти точку c:", a: ["Неприменима", "c = 3", "c = -3", "c = 0"], c: 3 },
            { q: "Применима ли теорема Лагранжа для f(x) = x<sup>2</sup> - 2x - 3 на отрезке [-2, 4]? Найти c:", a: ["c = 3", "c = 1,5", "Неприменима", "c = 1"], c: 3 },
            { q: "Вычислить предел lim<sub>x&rarr;0</sub> (ln sin 2x) / (ln sin x) с помощью правила Лопиталя:", a: ["1", "-1", "2", "4"], c: 0 },
            { q: "Функция y = x<sup>2</sup> e<sup>-x</sup> возрастает на:", a: ["[-&infin;, 0] &cup; [2, +&infin;]", "[-&infin;, -2] &cup; [2, +&infin;]", "[-2, 2]", "[0, 2]"], c: 3 },
            { q: "Функция y = 2x<sup>2</sup> - ln x убывает на:", a: ["[-&infin;, -1] &cup; [0, 1]", "[-1/2, 0] &cup; [2, +&infin;]", "[-&infin;, -2] &cup; [2, +&infin;]", "(0, 1/2]"], c: 3 },
            { q: "Наибольшее значение функции y = 2x - 2 ln x на отрезке [1/e; e] равно:", a: ["2", "2/e + 2", "2e - 2", "4"], c: 2 },
            { q: "Предел функции lim<sub>x&rarr;0, y&rarr;0</sub> sin(xy) / 5y равен:", a: ["0", "1", "5", "0,2"], c: 0 },
            { q: "Предел функции lim<sub>x&rarr;2, y&rarr;1</sub> (x<sup>2</sup> - 4xy + 4y<sup>2</sup>) / (x - 2y) равен:", a: ["Не существует", "1", "0", "-1"], c: 2 },
            { q: "Предел функции lim<sub>x&rarr;&infin;, y&rarr;&infin;</sub> ((xy-2) / (xy+3))<sup>5xy-1</sup> равен:", a: ["e<sup>-20</sup>", "e<sup>5</sup>", "e<sup>-25</sup>", "e<sup>-30</sup>"], c: 2 },
            { q: "Частная производная функции z = (sin y)<sup>x</sup> по x равна:", a: ["z'<sub>x</sub> = (sin y)<sup>x</sup> ln(sin y)", "z'<sub>x</sub> = x(sin y)<sup>x-1</sup>", "z'<sub>x</sub> = (sin y)<sup>x</sup> cos y", "z'<sub>x</sub> = x(sin y)<sup>x-1</sup> ln(sin y)"], c: 0 },
            { q: "Частная производная функции z = (sin y)<sup>x</sup> по y равна:", a: ["z'<sub>y</sub> = (sin y)<sup>x</sup> ln(sin y)", "z'<sub>y</sub> = x(sin y)<sup>x-1</sup>", "z'<sub>y</sub> = x(sin y)<sup>x-1</sup> cos y", "z'<sub>y</sub> = (sin y)<sup>x</sup> cos y"], c: 2 },
            { q: "Найти grad z (где z = x ln(x+y)) в заданной точке M(-1; 2):", a: ["grad z = (1, 1)", "grad z = (-1, -1)", "grad z = (2, 1)", "grad z = (-1, 1)"], c: 1 },
            { q: "Найти область определения функции y = &radic;(3x + 9):", a: ["[3; &infin;)", "(-&infin;; 3]", "[-3; &infin;)", "[-3; 3]"], c: 2 },
            { q: "Найти область определения функции y = ln(8 - 2x):", a: ["(4; &infin;)", "(-&infin;; 2]", "[-4; 4]", "(-&infin;; 4)"], c: 3 },
            { q: "Вычислить неопределенный интеграл &int; sin(3 - 7x) dx:", a: ["1/7 cos(3 - 7x) + C", "-7 cos(3 - 7x) + C", "-1/7 cos(3 - 7x) + C", "7 cos(3 - 7x) + C"], c: 0 },
            { q: "Вычислить определенный интеграл &int;<sub>1</sub><sup>3</sup> (2x + 1) dx:", a: ["10", "-1/4", "7", "1/4"], c: 0 }
        ];

        let currentQuestions = [];

        function getRandomQuestions(array, num) {
            const shuffled = [...array].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, Math.min(num, array.length));
        }

        function startQuiz(mode) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            const titleEl = document.getElementById('quiz-title');

            if (mode === 'theory') {
                titleEl.textContent = 'Теоретическая часть (20 вопросов)';
                currentQuestions = getRandomQuestions(theoryDB, 20);
            } else if (mode === 'practice') {
                titleEl.textContent = 'Практическая часть (20 вопросов)';
                currentQuestions = getRandomQuestions(practiceDB, 20);
            } else {
                titleEl.textContent = 'Комплексный тест (40 вопросов)';
                const theoryPart = getRandomQuestions(theoryDB, 20);
                const practicePart = getRandomQuestions(practiceDB, 20);
                currentQuestions = [...theoryPart, ...practicePart].sort(() => 0.5 - Math.random());
            }
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-area');
            container.innerHTML = '';
            currentQuestions.forEach((q, qIndex) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.id = `q-block-${qIndex}`;

                const title = document.createElement('div');
                title.className = 'question-title';
                title.innerHTML = `<strong>Вопрос ${qIndex + 1}:</strong> <span class="math">${q.q}</span>`;
                block.appendChild(title);

                q.a.forEach((optText, optIndex) => {
                    const label = document.createElement('label');
                    label.className = 'option';
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `question-${qIndex}`;
                    radio.value = optIndex;

                    label.appendChild(radio);
                    const span = document.createElement('span');
                    span.className = 'math';
                    span.innerHTML = optText;
                    label.appendChild(span);
                    block.appendChild(label);
                });
                container.appendChild(block);
            });
            window.scrollTo(0, 0);
        }

        function checkAnswers() {
            let score = 0;
            currentQuestions.forEach((q, qIndex) => {
                const block = document.getElementById(`q-block-${qIndex}`);
                const selected = document.querySelector(`input[name="question-${qIndex}"]:checked`);
                const labels = block.querySelectorAll('label');
                
                // Подсвечиваем правильный ответ
                labels[q.c].classList.add('correct');

                if (selected) {
                    const selectedVal = parseInt(selected.value);
                    if (selectedVal === q.c) {
                        score++;
                    } else {
                        labels[selectedVal].classList.add('incorrect');
                    }
                }
            });

            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            const percentage = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('score-text').textContent = `${score} из ${currentQuestions.length} (${percentage}%)`;
            
            // Прокручиваем вниз к результату
            setTimeout(() => {
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>
